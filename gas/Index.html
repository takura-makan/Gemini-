<!doctype html>
<html lang="ja">
<head>
  <base target="_top">
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <style>
    :root {
      --ink: #121512;
      --muted: #616b64;
      --paper: #f6f7f1;
      --panel: #ffffff;
      --line: #d9ded6;
      --green: #00a676;
      --blue: #2f80ed;
      --coral: #ff6b4a;
      --gold: #ffbf3f;
      --shadow: 0 16px 44px rgba(18, 21, 18, 0.11);
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      color: var(--ink);
      background: transparent;
      font-family: "Noto Sans JP", "Yu Gothic", "Hiragino Kaku Gothic ProN", system-ui, sans-serif;
      letter-spacing: 0;
    }

    a { color: inherit; text-decoration: none; }
    button, input { font: inherit; }

    .dispatch {
      width: 100%;
      overflow: hidden;
      color: var(--ink);
      background: var(--paper);
      border: 1px solid var(--line);
      border-radius: 8px;
    }

    .hero {
      position: relative;
      min-height: 360px;
      padding: clamp(26px, 5vw, 54px);
      display: grid;
      align-content: end;
      color: #f8fff7;
      background:
        radial-gradient(circle at 82% 12%, rgba(47, 128, 237, 0.24), transparent 32%),
        radial-gradient(circle at 10% 22%, rgba(0, 166, 118, 0.22), transparent 34%),
        linear-gradient(135deg, #101410 0%, #161b14 54%, #251a15 100%);
    }

    .admin-shortcut {
      position: absolute;
      top: 18px;
      right: 18px;
      display: inline-flex;
      align-items: center;
      min-height: 36px;
      padding: 0 12px;
      color: rgba(248, 255, 247, 0.92);
      background: rgba(248, 255, 247, 0.1);
      border: 1px solid rgba(248, 255, 247, 0.24);
      border-radius: 8px;
      font-size: 13px;
      font-weight: 850;
      backdrop-filter: blur(12px);
    }

    .admin-shortcut:focus-visible {
      outline: 2px solid var(--gold);
      outline-offset: 2px;
    }

    .label {
      display: inline-flex;
      align-items: center;
      gap: 10px;
      margin: 0 0 16px;
      color: rgba(248, 255, 247, 0.74);
      font-size: 13px;
      font-weight: 850;
      text-transform: uppercase;
    }

    .label::before {
      content: "";
      width: 32px;
      height: 2px;
      background: var(--green);
    }

    h1 {
      max-width: 920px;
      margin: 0;
      font-size: clamp(40px, 8vw, 86px);
      line-height: 0.96;
      letter-spacing: 0;
    }

    .hero-copy {
      max-width: 720px;
      margin: 20px 0 0;
      color: rgba(248, 255, 247, 0.82);
      font-size: clamp(17px, 2vw, 22px);
      line-height: 1.72;
    }

    .updates {
      padding: clamp(22px, 5vw, 46px);
    }

    .section-head {
      display: flex;
      align-items: end;
      justify-content: space-between;
      gap: 20px;
      margin-bottom: 18px;
    }

    .section-head h2 {
      margin: 0;
      font-size: clamp(28px, 4vw, 46px);
      line-height: 1.05;
    }

    .section-head p {
      max-width: 520px;
      margin: 0;
      color: var(--muted);
      line-height: 1.75;
    }

    .toolbar {
      display: grid;
      grid-template-columns: minmax(220px, 1fr) auto auto;
      gap: 12px;
      margin-bottom: 16px;
    }

    .search input {
      width: 100%;
      min-height: 46px;
      padding: 0 14px;
      color: var(--ink);
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: 8px;
      outline: none;
    }

    .filters {
      display: inline-flex;
      gap: 6px;
      padding: 5px;
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: 8px;
    }

    .filters button {
      min-height: 36px;
      padding: 0 12px;
      color: var(--muted);
      background: transparent;
      border: 1px solid transparent;
      border-radius: 8px;
      cursor: pointer;
      font-size: 14px;
      font-weight: 850;
    }

    .filters button.is-active {
      color: #06100c;
      background: var(--gold);
    }

    .admin-link {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-height: 46px;
      padding: 0 14px;
      color: var(--ink);
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: 8px;
      font-size: 14px;
      font-weight: 850;
      white-space: nowrap;
    }

    .admin-link:focus-visible {
      outline: 2px solid var(--blue);
      outline-offset: 2px;
    }

    .cards {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 14px;
    }

    .card {
      display: grid;
      grid-template-rows: auto 1fr auto;
      min-height: 286px;
      padding: 17px;
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: 8px;
      box-shadow: var(--shadow);
    }

    .meta {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
      color: var(--muted);
      font-size: 13px;
      font-weight: 850;
    }

    .pill {
      display: inline-flex;
      align-items: center;
      min-height: 26px;
      padding: 0 9px;
      color: var(--ink);
      background: color-mix(in srgb, var(--paper) 58%, var(--panel));
      border: 1px solid var(--line);
      border-radius: 999px;
      font-size: 12px;
      font-weight: 850;
      white-space: nowrap;
    }

    .card h3 {
      margin: 17px 0 11px;
      font-size: 21px;
      line-height: 1.3;
    }

    .card p {
      margin: 0;
      color: var(--muted);
      line-height: 1.72;
      white-space: pre-line;
    }

    .card-footer {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
      margin-top: 22px;
      padding-top: 14px;
      border-top: 1px solid var(--line);
    }

    .source { color: var(--blue); font-weight: 850; }
    .audience { color: var(--coral); font-size: 13px; font-weight: 900; text-align: right; }
    .embed-note { margin-top: 18px; color: var(--muted); font-size: 12px; line-height: 1.6; text-align: right; }

    @media (max-width: 920px) {
      .cards { grid-template-columns: repeat(2, minmax(0, 1fr)); }
      .section-head, .toolbar { align-items: start; grid-template-columns: 1fr; flex-direction: column; }
      .filters { overflow-x: auto; justify-content: start; }
      .filters button { flex: 0 0 auto; }
    }

    @media (max-width: 560px) {
      .hero { min-height: 420px; padding: 74px 24px 24px; }
      .admin-shortcut { left: 24px; right: auto; }
      .cards { grid-template-columns: 1fr; }
      .card-footer, .meta { align-items: flex-start; flex-direction: column; }
      .audience { text-align: left; }
    }
  </style>
</head>
<body>
  <section class="dispatch" aria-label="Workspace Gemini Dispatch">
    <div class="hero">
      <a class="admin-shortcut" href="<?= publisherUrl ?>" target="_blank" rel="noreferrer">管理者画面</a>
      <div>
        <p class="label">Internal update intelligence</p>
        <h1>Workspace / Gemini Dispatch</h1>
        <p class="hero-copy">Google Workspace と Gemini の更新情報から、社員に関係しそうなものだけを短く届けます。気になるカードだけ拾えばOKです。</p>
      </div>
    </div>

    <div class="updates">
      <div class="section-head">
        <div>
          <p class="label" style="color: var(--muted);">Signal feed</p>
          <h2>今週のアップデート</h2>
        </div>
        <p>試すときは社内ルールの範囲で、社外秘・個人情報・顧客情報の扱いに注意してください。</p>
      </div>

      <div class="toolbar" aria-label="記事検索と分類">
        <label class="search">
          <input id="searchInput" type="search" placeholder="サービス名・部署・キーワードで検索">
        </label>
        <div class="filters" role="group" aria-label="分類">
          <button type="button" class="is-active" data-filter="all">すべて</button>
          <button type="button" data-filter="速報">速報</button>
          <button type="button" data-filter="活用">活用</button>
          <button type="button" data-filter="注意">注意</button>
        </div>
        <a class="admin-link" href="<?= publisherUrl ?>" target="_blank" rel="noreferrer">管理者画面</a>
      </div>

      <div class="cards" id="updatesGrid" aria-live="polite">
        <article class="card"><div></div><div><h3>読み込み中...</h3><p>最新の掲載情報を取得しています。</p></div><div></div></article>
      </div>
      <p class="embed-note" id="checkedDate"></p>
    </div>
  </section>

  <script>
    let updates = [];
    let activeFilter = 'all';
    const grid = document.querySelector('#updatesGrid');
    const searchInput = document.querySelector('#searchInput');
    const filterButtons = document.querySelectorAll('[data-filter]');
    const checkedDate = document.querySelector('#checkedDate');

    function escapeHtml(value) {
      return String(value ?? '').replace(/[&<>"']/g, (char) => ({
        '&': '&amp;',
        '<': '&lt;',
        '>': '&gt;',
        '"': '&quot;',
        "'": '&#39;',
      }[char]));
    }

    function renderUpdates() {
      const query = searchInput.value.trim().toLowerCase();
      const filtered = updates.filter((item) => {
        const matchesFilter = activeFilter === 'all' || item.type === activeFilter;
        const haystack = `${item.type} ${item.service} ${item.title} ${item.summary} ${item.audience}`.toLowerCase();
        return matchesFilter && haystack.includes(query);
      });

      grid.innerHTML = filtered.map((item) => `
        <article class="card">
          <div class="meta">
            <span>${escapeHtml(item.sourceDate || '')}</span>
            <span class="pill">${escapeHtml(item.type)} / ${escapeHtml(item.service)}</span>
          </div>
          <div>
            <h3>${escapeHtml(item.title)}</h3>
            <p>${escapeHtml(item.summary)}</p>
          </div>
          <div class="card-footer">
            <a class="source" href="${escapeHtml(item.url)}" target="_blank" rel="noreferrer">${escapeHtml(item.sourceName || 'Workspace Updates')}</a>
            <span class="audience">${escapeHtml(item.audience)}</span>
          </div>
        </article>
      `).join('');

      if (!filtered.length) {
        grid.innerHTML = `<article class="card"><div></div><div><h3>掲載中の更新はありません</h3><p>候補が公開されるとここに表示されます。</p></div><div></div></article>`;
      }

      checkedDate.textContent = updates.length ? `Sources checked ${updates[0].sourceDate || ''}` : '';
    }

    filterButtons.forEach((button) => {
      button.addEventListener('click', () => {
        activeFilter = button.dataset.filter;
        filterButtons.forEach((item) => item.classList.toggle('is-active', item === button));
        renderUpdates();
      });
    });

    searchInput.addEventListener('input', renderUpdates);

    google.script.run
      .withSuccessHandler((items) => {
        updates = items || [];
        renderUpdates();
      })
      .withFailureHandler((error) => {
        grid.innerHTML = `<article class="card"><div></div><div><h3>読み込みに失敗しました</h3><p>${escapeHtml(error.message || error)}</p></div><div></div></article>`;
      })
      .getPublishedItems();
  </script>
</body>
</html>
